name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun lint

      - name: Build library
        run: bun build:lib

      - name: Build server
        run: bun build:server

      # --- Release (push to main only) ---

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Release
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: bunx semantic-release

      - name: Read release version
        if: always() && github.event_name == 'push'
        id: release
        run: |
          if [ -f .release-version ]; then
            echo "version=$(cat .release-version)" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        if: always() && steps.release.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/signalling-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/signalling-server:latest
            ghcr.io/${{ github.repository }}/signalling-server:${{ steps.release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/signalling-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/signalling-server:${{ steps.release.outputs.version }}
