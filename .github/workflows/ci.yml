name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      phop: ${{ steps.filter.outputs.phop }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^packages/phop/'; then
            echo "phop=true" >> $GITHUB_OUTPUT
          else
            echo "phop=false" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^packages/signalling-server/'; then
            echo "server=true" >> $GITHUB_OUTPUT
          else
            echo "server=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun lint

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Build library and server
        run: bun build:lib && bun build:server

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: packages/integration-tests

      - name: Run integration tests
        run: bun run test:integration

  phop-unit-test:
    name: phop unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Run phop unit tests
        run: bun --filter=@peterddod/phop run test

  semantic-release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (needs.changes.outputs.phop == 'true' || needs.changes.outputs.server == 'true')
    needs: [lint, changes, integration-test, phop-unit-test]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      phop: ${{ needs.changes.outputs.phop }}
      server: ${{ needs.changes.outputs.server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      - name: Read release version
        id: release
        run: |
          if [ -f .release-version ]; then
            echo "version=$(cat .release-version)" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  build-lib:
    name: Build library
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.semantic-release.outputs.phop == 'true'
    needs: [semantic-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Build library
        run: bun build:lib

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: phop-dist
          path: packages/phop/dist/
          retention-days: 1

  build-server:
    name: Build server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.semantic-release.outputs.server == 'true'
    needs: [semantic-release]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Build server
        run: bun build:server

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [semantic-release, build-lib]
    if: needs.semantic-release.outputs.released == 'true' && needs.build-lib.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: phop-dist
          path: packages/phop/dist/

      - name: Publish
        working-directory: packages/phop
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [semantic-release, build-server]
    if: needs.semantic-release.outputs.released == 'true' && needs.build-server.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/signalling-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/signalling-server:latest
            ghcr.io/${{ github.repository }}/signalling-server:${{ needs.semantic-release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/signalling-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/signalling-server:${{ needs.semantic-release.outputs.version }}
